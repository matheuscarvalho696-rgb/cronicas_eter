<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Entrar — Crônicas do Éter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
</head>
<body>
<div id="stars"></div>
<nav class="topbar">
<a class="nav-brand" href="index.html">Crônicas do Éter</a>
</nav>
<main class="auth-page">
<section class="auth-card">
<p class="section-label">Acesso dos Jogadores</p>
<h1 class="auth-heading">Entrar no Éter</h1>
<p class="auth-copy">Crie sua conta, receba um código no e-mail informado e digite o código para liberar o acesso.</p>
<div class="auth-tabs">
<button class="auth-tab active" data-auth-tab="login">Entrar</button>
<button class="auth-tab" data-auth-tab="register">Criar conta</button>
<button class="auth-tab hidden" data-auth-tab="verify" id="verifyTabButton">Validar código</button>
</div>
<div id="firebaseWarning" class="auth-warning hidden"></div>
<form id="loginForm" class="auth-form">
<label>E-mail<input type="email" id="loginEmail" required autocomplete="email"/></label>
<label>Senha<input type="password" id="loginPassword" required autocomplete="current-password"/></label>
<button class="btn-primary full" type="submit">Entrar</button>
<button class="link-button" type="button" id="forgotPassword">Esqueci minha senha</button>
</form>
<form id="registerForm" class="auth-form hidden">
<label>Nome do jogador<input type="text" id="registerName" required autocomplete="name"/></label>
<label>E-mail<input type="email" id="registerEmail" required autocomplete="email"/></label>
<label>Senha<input type="password" id="registerPassword" required minlength="6" autocomplete="new-password"/></label>
<button class="btn-primary full" type="submit">Criar conta e enviar código</button>
<p class="auth-hint">Após criar a conta, enviaremos um código para o e-mail informado. O campo de código ficará disponível em seguida.</p>
</form>
<form id="verifyForm" class="auth-form hidden">
<label>Código recebido por e-mail<input type="text" id="emailCode" autocomplete="one-time-code" inputmode="numeric" placeholder=""/></label>
<button class="btn-primary full" type="submit">Validar código</button>
<button class="link-button" type="button" id="resendCode">Reenviar código</button>
</form>
<p id="authMessage" class="auth-message"></p>
</section>
</main>
<script type="module">
import { isAuthConfigured, login, resetPassword, watchAuth, registerWithEmailCode, verifyRegistrationCode, resendEmailVerificationCode, hasApprovedAccess } from './auth-service.js';

const params = new URLSearchParams(location.search);
const redirect = params.get('redirect') || 'perfil.html';
const tabs = document.querySelectorAll('.auth-tab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const verifyForm = document.getElementById('verifyForm');
const verifyTabButton = document.getElementById('verifyTabButton');
const msg = document.getElementById('authMessage');
const warning = document.getElementById('firebaseWarning');

function setMessage(text, type='') { msg.textContent = text; msg.className = 'auth-message ' + type; }
function setTab(tab) {
  tabs.forEach(b => b.classList.toggle('active', b.dataset.authTab === tab));
  loginForm.classList.toggle('hidden', tab !== 'login');
  registerForm.classList.toggle('hidden', tab !== 'register');
  verifyForm.classList.toggle('hidden', tab !== 'verify');
  setMessage('');
}
tabs.forEach(btn => btn.addEventListener('click', () => setTab(btn.dataset.authTab)));

if (!isAuthConfigured()) {
  warning.classList.remove('hidden');
  warning.textContent = 'Firebase ainda não configurado. Preencha firebase-config.js antes de usar login real.';
}

watchAuth(({ user, profile, configured }) => {
  if (configured && user && profile && !hasApprovedAccess(profile)) {
    verifyTabButton.classList.remove('hidden');
    setTab('verify');
    setMessage('Conta criada. Digite o código enviado para seu e-mail.', 'success');
    return;
  }
  if (configured && user && hasApprovedAccess(profile)) window.location.href = redirect;
});

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    setMessage('Entrando...');
    await login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
  } catch (err) {
    setMessage(err.message || 'Não foi possível entrar.', 'error');
  }
});

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    setMessage('Criando conta e enviando código...');
    const result = await registerWithEmailCode({
      nome: document.getElementById('registerName').value.trim(),
      email: document.getElementById('registerEmail').value.trim(),
      senha: document.getElementById('registerPassword').value
    });
    if (result.requiresCode) {
      verifyTabButton.classList.remove('hidden');
      setTab('verify');
      setMessage('Código enviado por e-mail. Verifique sua caixa de entrada e spam.', 'success');
    } else {
      setMessage('Conta criada com sucesso. Redirecionando...', 'success');
      setTimeout(() => window.location.href = redirect, 700);
    }
  } catch (err) {
    setMessage(err.message || 'Não foi possível criar a conta.', 'error');
  }
});

verifyForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    setMessage('Validando código...');
    await verifyRegistrationCode(document.getElementById('emailCode').value.trim());
    setMessage('Código validado. Redirecionando...', 'success');
    setTimeout(() => window.location.href = redirect, 700);
  } catch (err) {
    setMessage(err.message || 'Não foi possível validar o código.', 'error');
  }
});

document.getElementById('resendCode').addEventListener('click', async () => {
  try {
    setMessage('Reenviando código...');
    await resendEmailVerificationCode();
    setMessage('Novo código enviado por e-mail.', 'success');
  } catch (err) {
    setMessage(err.message || 'Não foi possível reenviar o código.', 'error');
  }
});

document.getElementById('forgotPassword').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) return setMessage('Digite seu e-mail primeiro.', 'error');
  try { await resetPassword(email); setMessage('E-mail de recuperação enviado.', 'success'); }
  catch (err) { setMessage(err.message || 'Não foi possível enviar recuperação.', 'error'); }
});
</script>
</body>
</html>
